<div class="container mt-4">
    <h3>Simple Popup Demo</h3>
    <button class="btn btn-primary" (click)="openPopup()">Open Popup</button>

    <!-- Popup -->
    <div *ngIf="showPopup" class="modal-backdrop fade show"></div>
    <div *ngIf="showPopup" class="modal d-block" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Popup Title</h5>
                    <button type="button" class="btn-close" (click)="closePopup()"></button>
                </div>
                <div class="modal-body">
                    <p>This is a simple popup content!</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" (click)="closePopup()">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>
