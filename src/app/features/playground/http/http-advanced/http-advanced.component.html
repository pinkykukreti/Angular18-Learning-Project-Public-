<div class="container mt-4">

  <h3>HTTP + RxJS Operators Demo</h3>

  <!-- POST FORM -->
  <div class="card p-3 mb-3">
    <h5>Add Post (POST)</h5>
    <input class="form-control mb-2" placeholder="Title" [(ngModel)]="postTitle">
    <textarea class="form-control mb-2" placeholder="Body" [(ngModel)]="postBody"></textarea>
    <button class="btn btn-success" (click)="submitPost()">Submit</button>
  </div>

  <!-- SEARCH -->
  <input class="form-control mb-3" placeholder="Search posts..."
         (input)="search($event)">

  <!-- BUTTONS -->
  <div class="mb-3">
    <button class="btn btn-primary me-2" (click)="forkJoinDemo()">forkJoin</button>
    <button class="btn btn-warning me-2" (click)="mergeDemo()">merge</button>
    <button class="btn btn-info" (click)="concatDemo()">concat</button>
  </div>

  <!-- LIST -->
  <ul class="list-group">
    <li class="list-group-item" *ngFor="let post of filteredPosts">
      <strong>{{ post.title }}</strong>
      <p>{{ post.body }}</p>
    </li>
  </ul>

</div>
