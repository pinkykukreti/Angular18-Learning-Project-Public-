<div class="qa-container">
  <h2>Lifecycle Hooks</h2>

  @for (item of qaList; track $index) {
    <div class="qa-card">

      <div class="question" (click)="toggleAnswer($index)">
        <!-- <span class="category">[{{ item.category }}]</span> -->
        Q{{ $index + 1 }}. {{ item.question }}
      </div>

      @if (selectedIndex === $index) {
        <div class="answer">
          {{ item.answer }}
        </div>
      }

    </div>
  }
</div>
